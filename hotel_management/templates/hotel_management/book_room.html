{% extends 'hotel_management/base.html' %}

{% block content %}
<div class="row justify-content-center slide-up">
    <div class="col-md-8">
        <div class="card p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold"><i class="bi bi-calendar-check text-primary"></i> Book a Room</h2>
                <p class="text-muted">Create a new reservation instantly.</p>
            </div>

            <form action="{% url 'book_room' %}" method="POST" class="needs-validation">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
                            <label for="name"><i class="bi bi-person"></i> Full Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="contact" name="contact" placeholder="1234567890" required>
                            <label for="contact"><i class="bi bi-telephone"></i> Contact Number</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating mb-4">
                    <select class="form-select" id="room_number" name="room_number" required>
                        <option value="" disabled selected>Select an available room</option>
                        {% for room in available_rooms %}
                            <option value="{{ room.room_number }}">Room {{ room.room_number }} - {{ room.room_type }} (Floor {{ room.floor }})</option>
                        {% endfor %}
                    </select>
                    <label for="room_number"><i class="bi bi-door-open"></i> Select Room</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-modern btn-primary-custom btn-lg">Confirm Booking <i class="bi bi-arrow-right ms-2"></i></button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
